name: Deploy AlMal.Admin

on:
  push:
    branches: [main]
    paths:
      - "src/AlMal.Admin/**"
      - "src/AlMal.Domain/**"
      - "src/AlMal.Application/**"
      - "src/AlMal.Infrastructure/**"
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore AlMal.sln

      - name: Build
        run: dotnet build AlMal.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test AlMal.sln --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish src/AlMal.Admin/AlMal.Admin.csproj --configuration Release --no-build --output ./publish

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply EF Core migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.SQL_CONNECTION_STRING }}
        run: dotnet ef database update --project src/AlMal.Infrastructure --startup-project src/AlMal.Admin --configuration Release

      - name: Deploy to IIS via Web Deploy
        shell: cmd
        run: |
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" ^
            -verb:sync ^
            -source:contentPath="%GITHUB_WORKSPACE%\publish" ^
            -dest:contentPath="AlMal-Admin",computerName="${{ secrets.IIS_SERVER_URL }}",username="${{ secrets.IIS_USERNAME }}",password="${{ secrets.IIS_PASSWORD }}",authType="Basic" ^
            -allowUntrusted ^
            -enableRule:AppOffline
